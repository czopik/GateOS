<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GateOS - Piloty</title>
  <link rel="stylesheet" href="/styles.css?v=20260102">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand" aria-label="GateOS">
        <div class="logo">G</div>
        <div>GateOS</div>
      </div>
      <nav class="nav" aria-label="Nawigacja">
        <a href="/">Dashboard</a>
        <a href="/settings.html">Ustawienia</a>
        <a href="/calibration.html">Kalibracja</a>
        <a class="active" href="/remotes.html">Piloty</a>
        <a href="/settings.html#diagnostyka">Diagnostyka</a>
        <a href="/settings.html#ota">Aktualizacje</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="grid">
      <section class="card" style="--delay:0s">
        <h2>Tryb uczenia</h2>
        <div class="toggle-row">
          <div>
            <strong>Tryb uczenia</strong>
            <div class="info-row" id="learnStatus">Wylaczony</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="learnToggle">
            <span class="slider"></span>
          </label>
        </div>
        <div class="section-actions">
          <button class="btn ghost" id="listenBtn" type="button">Nasluchuj 10s</button>
        </div>
      </section>

      <section class="card" style="--delay:0.05s">
        <h2>Ostatnio odebrane</h2>
        <div class="metric-list">
          <div class="metric">
            <div class="label">ID</div>
            <div class="value" id="lastSerial">-</div>
          </div>
          <div class="metric">
            <div class="label">Nazwa</div>
            <div class="value" id="lastName">-</div>
          </div>
          <div class="metric">
            <div class="label">Counter</div>
            <div class="value" id="lastCounter">-</div>
          </div>
          <div class="metric">
            <div class="label">Status</div>
            <div class="value" id="lastAuth">-</div>
          </div>
        </div>
      </section>
    </div>

    <section class="card" style="--delay:0.1s;margin-top:24px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <h2>Lista pilotow</h2>
        <div class="section-actions">
          <button class="btn ghost" id="addRemoteBtn" type="button">Dodaj pilota</button>
          <button class="btn ghost" id="exportRemotesBtn" type="button">Eksport</button>
          <button class="btn ghost" id="importRemotesBtn" type="button">Import</button>
          <input type="file" id="importRemotesFile" accept="application/json" style="display:none">
        </div>
      </div>
      <table class="table">
        <thead>
          <tr>
            <th>Nazwa</th>
            <th>ID</th>
            <th>Status</th>
            <th>Counter</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody id="remotesTable"></tbody>
      </table>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="modal" id="remoteModal" aria-hidden="true">
    <div class="modal-card">
      <h3 id="remoteModalTitle">Pilot</h3>
      <div class="form-grid" style="grid-template-columns:1fr">
        <div class="field">
          <label>ID pilota</label>
          <input type="number" id="remoteSerialInput" placeholder="np. 123456">
        </div>
        <div class="field">
          <label>Nazwa</label>
          <input type="text" id="remoteNameInput" placeholder="np. Pilot A">
        </div>
        <div class="field">
          <label>Wlaczony</label>
          <label class="switch">
            <input type="checkbox" id="remoteEnabledInput" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="section-actions" style="margin-top:16px">
        <button class="btn primary" id="remoteSaveBtn" type="button">Zapisz</button>
        <button class="btn ghost" id="remoteCancelBtn" type="button">Anuluj</button>
      </div>
    </div>
  </div>

  <div class="modal" id="confirmModal" aria-hidden="true">
    <div class="modal-card">
      <h3>Potwierdzenie</h3>
      <p id="confirmText">Czy na pewno?</p>
      <div class="section-actions" style="margin-top:16px">
        <button class="btn danger" id="confirmYes" type="button">Tak</button>
        <button class="btn ghost" id="confirmNo" type="button">Anuluj</button>
      </div>
    </div>
  </div>

  <script src="/remotes.js?v=20260102"></script>
</body>
</html>
