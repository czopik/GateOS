; PlatformIO Project Configuration File

[env:esp32]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino

; Kompilacja
build_src_filter = +<*.cpp> -<main.cpp>

; Upload / monitor
upload_speed = 921600
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
monitor_rts = 0
monitor_dtr = 0

; OTA note:
; default esp32dev partitions support OTA slots (ota_0/ota_1),
; so we keep the partition scheme unchanged to minimize risk.

; System plików – LittleFS (montowany jako pierwszy w firmware)
board_build.filesystem = littlefs

; Flagi kompilatora
build_flags =
    -DASYNC_TCP_SSL_ENABLED=0
    -DARDUINO_LOOP_STACK_SIZE=12288

; Biblioteki
lib_deps =
    esphome/ESPAsyncWebServer-esphome@^3.1.0
    esphome/AsyncTCP-esphome@^2.1.1
    bblanchon/ArduinoJson@^6
    knolleary/PubSubClient@^2.8
    thomasfredericks/Bounce2@^2.72
    fastled/FastLED@^3.6.0

[env:esp32_ota]
platform = ${env:esp32.platform}
board = ${env:esp32.board}
framework = ${env:esp32.framework}
build_src_filter = ${env:esp32.build_src_filter}
monitor_speed = ${env:esp32.monitor_speed}
monitor_rts = ${env:esp32.monitor_rts}
monitor_dtr = ${env:esp32.monitor_dtr}
board_build.filesystem = ${env:esp32.board_build.filesystem}
build_flags = ${env:esp32.build_flags}
lib_deps = ${env:esp32.lib_deps}

; OTA firmware / filesystem uploads over Wi-Fi (set IP before upload)
upload_protocol = espota
upload_port = 192.168.1.124
