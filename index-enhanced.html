<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateOS Enhanced UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #3b3b3b;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .gate {
            width: 300px;
            height: 300px;
            background: url('https://example.com/gate.png') no-repeat center center;
            background-size: contain;
            animation: openClose 2s infinite;
        }
        @keyframes openClose {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .footer {
            margin-top: 20px;
            color: #666;
        }
        @media (max-width: 600px) {
            .gate {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to GateOS</h1>
    </div>
    <div class="container">
        <div class="gate"></div>
        <p>Enjoy our enhanced visualization and animations!</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 GateOS. All rights reserved.</p>
    </div>
</body>
</html>
